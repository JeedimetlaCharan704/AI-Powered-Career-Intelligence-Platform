<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPilot AI — Internships</title>

    <script>
        (function () {
            var saved = localStorage.getItem('skillpilot_theme') || 'system'
            var theme = saved === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : saved
            document.documentElement.setAttribute('data-theme', theme)
            document.documentElement.setAttribute('data-theme-mode', saved)
        })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="js/route-guard.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Left Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="https://aurora.edu.in/" target="_blank"><img src="images/logo.png" alt="Aurora University Logo" class="sidebar-logo"></a>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="menu-item" data-page="index.html"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a></li>
                <li><a href="internships.html" class="menu-item" data-page="internships.html"><i class="fa-solid fa-briefcase"></i> <span>Internships</span></a></li>

                <li><a href="brand-checker.html" class="menu-item" data-page="brand-checker.html"><i class="fa-solid fa-tag"></i> <span>Brand Checker</span></a></li>

                <li><a href="profile.html" class="menu-item" data-page="profile.html"><i class="fa-solid fa-user"></i> <span>Profile</span></a></li>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color);">
                <li><a href="#" class="menu-item logout-btn" style="color: var(--primary-color);"><i class="fa-solid fa-right-from-bracket"></i>
                        <span>Logout</span></a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Navbar -->
            <nav class="navbar">
                <div class="nav-left">
                    <div class="toggle-btn"><i class="fa-solid fa-bars"></i></div>
                    <h1 class="page-title">Available Internships</h1>
                </div>
                <div class="nav-right">
                    <div class="notification-bell">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <div class="user-profile" style="cursor: pointer;" onclick="window.location.href='profile.html'">
                        <img src="images/profile.png" alt="Student Profile">
                        <div class="user-info">
                            <span class="user-name" id="nav-user-name">Aryan Sharma</span>
                            <span class="user-role">Student</span>
                        </div>
                        <i class="fa-solid fa-chevron-down" style="font-size: 0.8rem; color: var(--text-light);"></i>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="page-content">
                


                <!-- ================= INTERNSHIPS SECTION ================= -->
                <div id="internships-section" class="content-section">
                    <!-- Search and Filters -->
                    <div class="filter-section card mb-4">
                        <div class="card-body flex-between" style="flex-wrap: wrap; gap: 15px;">
                            <div class="search-box">
                                <i class="fa-solid fa-search"></i>
                                <input type="text" placeholder="Search internships, companies...">
                            </div>
                            <div class="filter-buttons">
                                <button class="btn btn-outline-primary active">All</button>
                                <button class="btn btn-outline-primary">IT / Software</button>
                                <button class="btn btn-outline-primary">Core Engg</button>
                                <button class="btn btn-outline-primary">Management</button>
                            </div>
                        </div>
                    </div>

                    <!-- Internships Grid -->
                    <div class="internships-grid" id="student-internships-grid">
                        <!-- Dynamic internship cards will be rendered here by script.js -->
                    </div>
                </div>



            </div>
        </main>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal-overlay hidden">
        <div class="modal-content card">
            <div class="card-header flex-between">
                <h3>Edit Profile</h3>
                <button id="close-modal-btn" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="card-body">
                <form id="edit-profile-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="input-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="input-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="input-phone" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Address / Hostel</label>
                        <input type="text" id="input-location" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full mt-4">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Apply Form Modal -->
    <div id="apply-modal" class="modal-overlay hidden">
        <div class="modal-content card">
            <div class="card-header flex-between">
                <h3>Submit Application</h3>
                <button id="close-apply-modal" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="card-body">
                <form id="apply-form">
                    <div class="form-group">
                        <label>Why should we hire you? (Cover Letter)</label>
                        <textarea class="form-control" rows="4" placeholder="Briefly describe your skills and interest..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Portfolio / GitHub Link (Optional)</label>
                        <input type="url" class="form-control" placeholder="https://github.com/yourprofile">
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Earliest Start Date</label>
                            <input type="date" class="form-control" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Willing to Relocate?</label>
                            <select class="form-control" required>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                                <option value="remote">Only Remote</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group mt-3">
                        <label>Resume</label>
                        <p style="font-size: 0.8rem; color: var(--text-light); margin-bottom: 5px;">Your default profile resume will be attached.</p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full mt-4">Confirm & Apply</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
